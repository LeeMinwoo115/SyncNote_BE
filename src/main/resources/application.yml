spring:
  config:
    import: optional:file:.env.properties
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    time-zone: Asia/Seoul
  output:
    ansi:
      enabled: always
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        default_schema: public
        default_batch_fetch_size: 100
        jdbc:
          time_zone: Asia/Seoul
          batch_size: 100
        order_inserts: true
        order_updates: true
    hibernate:
      ddl-auto: none
    show-sql: true
  data:
    redis:
      port: 6379
      timeout: 200ms
      connect-timeout: 200ms
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public
    default-schema: public
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_ADDRESS}
    password: ${MAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    root: INFO
    com.syncnote: DEBUG
    com.syncnote.global.security: DEBUG  # 보안 필터 로그 상세 출력
    org.hibernate.orm.jdbc.bind: OFF
    org.hibernate.orm.jdbc.extract: OFF
    org.springframework.transaction.interceptor: INFO
    org.hibernate.engine.jdbc.batch.internal: DEBUG

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: method
  default-produces-media-type: application/json
  default-consumes-media-type: application/json

custom:
  cors:
    allowed-origins:
      - https://www.mmm3.click
      - http://localhost:3000
      - http://localhost:5173
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowed-headers:
      - "Authorization"
      - "Content-Type"
      - "Accept"
      - "Origin"
      - "X-Requested-With"
      - "Cache-Control"
      - "Pragma"
      - "X-Recaptcha-Token"
      - "X-Device-Id"

  jwt:
    secret: ${JWT_SECRET}
    access-token-duration: ${JWT_ACCESS_TOKEN_DURATION:300}
    refresh-token-duration: ${JWT_REFRESH_TOKEN_DURATION:604800}

security:
  password:
    bcrypt-strength: 4

app:
  frontend:
    default-base-url: https://www.mmm3.click
    allowed-base-urls:
      - https://www.mmm3.click
      - http://localhost:5173
