name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Create application-test.yml
        run: |
          mkdir -p src/main/resources
          cat > src/main/resources/application-test.yml <<EOF
          spring:
            datasource:
              url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
              username: sa
              password:
              driver-class-name: org.h2.Driver
          
            jpa:
              hibernate:
                ddl-auto: create-drop
          
            flyway:
              enabled: false
          
            autoconfigure:
              exclude:
                - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
          
          custom:
            jwt:
              secret: test-secret-key-test-secret-key-test-secret-key
              access-token-duration: 300
              refresh-token-duration: 604800
          
            cors:
              allowed-origins:
                - http://localhost:3000
              allowed-methods:
                - GET
                - POST
                - PUT
                - DELETE
                - PATCH
                - OPTIONS
              allowed-headers:
                - Authorization
                - Content-Type
                - Accept
                - Origin
          
          cookie:
            secure: false
            same-site: Lax
            domain: ""
          
          security:
            password:
              bcrypt-strength: 4
          EOF

      - name: Run tests
        run: ./gradlew test

      - name: Build bootJar
        run: ./gradlew bootJar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/$OWNER/syncnote:latest .
          docker push ghcr.io/$OWNER/syncnote:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /dockerProjects/app
            mkdir -p /dockerProjects/npm/data
            mkdir -p /dockerProjects/npm/letsencrypt
            
            docker network inspect common >/dev/null 2>&1 || docker network create common
            
            cat > /dockerProjects/app/docker-compose.yml <<'EOF'
            version: "3.9"
            
            services:
              app:
                image: ghcr.io/leeminwoo115/syncnote:latest
                container_name: syncnote_app
                restart: unless-stopped
                env_file:
                  - .env
                ports:
                  - "8080:8080"
                networks:
                  - common
            
            networks:
              common:
                external: true
            EOF
            
            cat > /dockerProjects/app/.env <<'EOF'
            SPRING_PROFILES_ACTIVE=prod
            PORT=8080
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            COOKIE_DOMAIN=.mmm3.click
            EOF
            
            cd /dockerProjects/app
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u leeminwoo115 --password-stdin
            docker pull ghcr.io/leeminwoo115/syncnote:latest
            docker compose down || true
            docker compose up -d
            sleep 15
            curl -f http://localhost:8080/actuator/health